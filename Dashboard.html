<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yana — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --o: #DA7756;
    --o-l: #FDF1EC;
    --o-d: #B85C3A;
    --bg: #F7F6F3;
    --white: #FFFFFF;
    --n1: #1A1A1A;
    --n2: #2D2D2D;
    --n3: #4A4A4A;
    --n4: #6B6B6B;
    --n5: #8F8F8F;
    --n6: #B5B5B5;
    --n7: #D9D9D9;
    --n8: #EBEBEB;
    --n9: #F5F5F3;
    --grn: #16A34A;
    --grn-l: #F0FDF4;
    --red: #DC2626;
    --red-l: #FEF2F2;
    --sidebar-w: 56px;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--n1);
    height: 100vh;
    overflow: hidden;
    display: flex;
    padding-top: env(safe-area-inset-top, 0px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--white);
    border-right: 1px solid var(--n8);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: max(14px, env(safe-area-inset-top, 14px));
    padding-bottom: 14px;
    gap: 4px;
    flex-shrink: 0;
    z-index: 10;
  }

  .sidebar-logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--n1);
    letter-spacing: -.04em;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .sidebar-logo span { color: var(--o); }

  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--n5);
    transition: all .15s;
    position: relative;
  }
  .nav-btn:hover { background: var(--n9); color: var(--n2); }
  .nav-btn.active { background: var(--o); color: white; }
  .nav-btn svg { width: 16px; height: 16px; }

  .nav-badge {
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    border-radius: 7px;
    background: var(--red);
    color: white;
    font-size: 9px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  .sidebar-avatar {
    margin-top: auto;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--o);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: white;
    cursor: pointer;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── VIEWS ── */
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }

  /* ── CHAT VIEW ── */
  .chat-topbar {
    padding: 14px 18px;
    padding-top: max(14px, env(safe-area-inset-top, 14px));
    background: var(--white);
    border-bottom: 1px solid var(--n8);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-yana-id { display: flex; align-items: center; gap: 9px; }
  .chat-yana-av {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--o);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: white;
  }
  .chat-yana-name { font-size: 13px; font-weight: 500; }
  .chat-yana-status {
    font-size: 11px; color: var(--n5);
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%; background: var(--grn);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .chat-messages {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
  }

  /* Yana message */
  .msg-yana { display: flex; gap: 9px; align-items: flex-start; }
  .msg-yana-av {
    width: 26px; height: 26px;
    border-radius: 8px; background: var(--o);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: white;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg-yana-body { display: flex; flex-direction: column; gap: 7px; max-width: 560px; }
  .msg-yana-bubble {
    background: var(--white);
    border-radius: 4px 12px 12px 12px;
    padding: 10px 13px;
    font-size: 13px; color: var(--n1); line-height: 1.65;
    border: 1px solid var(--n8);
    animation: msgIn .25s ease both;
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

  /* Doctor message */
  .msg-doctor { display: flex; justify-content: flex-end; }
  .msg-doctor-bubble {
    background: var(--o);
    color: white;
    border-radius: 12px 4px 12px 12px;
    padding: 10px 13px;
    font-size: 13px; line-height: 1.6;
    max-width: 360px;
    animation: msgIn .25s ease both;
  }

  /* Inline card */
  .inline-card {
    border: 1px solid var(--n7);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--white);
    max-width: 380px;
    animation: msgIn .3s ease both;
  }
  .inline-card-head {
    padding: 9px 13px;
    border-bottom: 1px solid var(--n8);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 500;
  }
  .inline-card-body { padding: 10px 13px; }
  .inline-card-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--n8);
    font-size: 12px;
  }
  .inline-card-row:last-child { border-bottom: none; }

  /* Quick replies */
  .quick-replies { display: flex; gap: 6px; flex-wrap: wrap; }
  .qr-btn {
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--n7);
    background: var(--white);
    font-size: 12px; color: var(--n3);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .12s;
    animation: msgIn .3s ease both;
  }
  .qr-btn:hover { border-color: var(--o); color: var(--o-d); }

  /* Typing indicator */
  .msg-typing { display: flex; gap: 9px; align-items: center; }
  .typing-av {
    width: 26px; height: 26px;
    border-radius: 8px; background: var(--o);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: white; flex-shrink: 0;
  }
  .typing-dots {
    background: var(--white); border: 1px solid var(--n8);
    border-radius: 4px 12px 12px 12px;
    padding: 10px 14px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: var(--n5);
    animation: dot 1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

  /* Chat input */
  .chat-input {
    padding: 12px 16px;
    background: var(--white);
    border-top: 1px solid var(--n8);
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0;
  }
  .chat-input-field {
    flex: 1;
    background: var(--n9);
    border: 1px solid var(--n8);
    border-radius: var(--radius);
    padding: 9px 13px;
    font-size: 13px;
    color: var(--n1);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  .chat-input-field:focus { border-color: var(--o); }
  .chat-input-field::placeholder { color: var(--n5); }
  .chat-send-btn {
    width: 34px; height: 34px;
    border-radius: var(--radius);
    background: var(--o);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .12s;
  }
  .chat-send-btn:hover { background: var(--o-d); }

  /* ── CONVERSATIONS VIEW ── */
  .conv-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }

  .conv-list {
    border-right: 1px solid var(--n8);
    background: var(--white);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .conv-list-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--n8);
    display: flex; align-items: center; justify-content: space-between;
  }
  .conv-list-title { font-size: 13px; font-weight: 500; }
  .conv-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--n8);
  }
  .conv-search input {
    width: 100%;
    background: var(--n9);
    border: 1px solid var(--n8);
    border-radius: var(--radius);
    padding: 7px 11px;
    font-size: 12px;
    color: var(--n1);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .conv-items { flex: 1; overflow-y: auto; }
  .conv-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--n8);
    cursor: pointer;
    transition: background .1s;
  }
  .conv-item:hover { background: var(--n9); }
  .conv-item.active { background: var(--o-l); border-left: 3px solid var(--o); padding-left: 11px; }
  .conv-av {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: white;
    flex-shrink: 0;
  }
  .conv-body { flex: 1; min-width: 0; }
  .conv-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .conv-preview {
    font-size: 11px; color: var(--n5);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .conv-time { font-size: 10px; color: var(--n5); }
  .conv-unread {
    width: 16px; height: 16px; border-radius: 8px;
    background: var(--o); color: white;
    font-size: 9px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  .conv-detail {
    display: flex; flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .conv-detail-head {
    padding: 13px 18px;
    background: var(--white);
    border-bottom: 1px solid var(--n8);
    display: flex; align-items: center; gap: 10px;
  }
  .conv-detail-name { font-size: 13px; font-weight: 500; }
  .conv-detail-sub { font-size: 11px; color: var(--n5); }
  .conv-messages {
    flex: 1; padding: 14px 18px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .bubble-patient {
    max-width: 72%; padding: 8px 12px;
    background: var(--white); border-radius: 4px 10px 10px 10px;
    font-size: 12px; line-height: 1.6; color: var(--n1);
    border: 1px solid var(--n8); align-self: flex-start;
  }
  .bubble-yana {
    max-width: 72%; padding: 8px 12px;
    background: var(--o-l); border-radius: 10px 4px 10px 10px;
    font-size: 12px; line-height: 1.6; color: var(--o-d);
    border: 1px solid #F5C8B4; align-self: flex-end;
  }
  .bubble-time { font-size: 10px; color: var(--n5); align-self: flex-end; }
  .conv-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; color: var(--n5);
  }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    flex: 1; gap: 8px; color: var(--n5); font-size: 13px;
  }
  .loading-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--o);
    animation: dot 1s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: .15s; }
  .loading-dot:nth-child(3) { animation-delay: .3s; }

  /* ── RESPONSIVE ── */
  @media(max-width:600px) {
    .sidebar { width: 48px; }
    .conv-layout { grid-template-columns: 1fr; }
    .conv-list { display: none; }
    .conv-list.show { display: flex; position: absolute; z-index: 20; width: 100%; height: 100%; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--n7); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">y<span>.</span></div>

  <!-- Chat -->
  <div class="nav-btn active" id="nav-chat" onclick="switchView('chat')" title="Chat with Yana">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </div>

  <!-- Conversations -->
  <div class="nav-btn" id="nav-conv" onclick="switchView('conversations')" title="Patient conversations">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <div class="nav-badge" id="conv-badge" style="display:none">0</div>
  </div>

  <!-- Agenda placeholder -->
  <div class="nav-btn" title="Agenda (coming soon)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
  </div>

  <div class="sidebar-avatar">DS</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ── CHAT VIEW ── -->
  <div class="view active" id="view-chat">
    <div class="chat-topbar">
      <div class="chat-yana-id">
        <div class="chat-yana-av">Y</div>
        <div>
          <div class="chat-yana-name">Yana</div>
          <div class="chat-yana-status"><div class="status-dot"></div>Active · handling your clinic</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--n5)" id="chat-date"></div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input">
      <input class="chat-input-field" id="chat-input" placeholder="Ask Yana anything about your clinic…" onkeydown="handleChatKey(event)">
      <button class="chat-send-btn" onclick="sendChatMessage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ── CONVERSATIONS VIEW ── -->
  <div class="view" id="view-conversations">
    <div class="conv-layout">
      <div class="conv-list">
        <div class="conv-list-head">
          <div class="conv-list-title">Patients</div>
          <div style="font-size:11px;color:var(--n5)" id="conv-count">Loading…</div>
        </div>
        <div class="conv-search">
          <input placeholder="Search patients…" oninput="filterConversations(this.value)" id="conv-search">
        </div>
        <div class="conv-items" id="conv-items">
          <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      </div>
      <div class="conv-detail" id="conv-detail">
        <div class="conv-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <div style="font-size:13px">Select a patient to see their conversation</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://mcxfydsffwqhmusdtjgr.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jeGZ5ZHNmZndxaG11c2R0amdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzAyODksImV4cCI6MjA5MjEwNjI4OX0.MrtErXT8ERg6HraJ32cn3FlH7pZT317bmOiT0catorg'

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  let allConversations = []
  let selectedPatient = null

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', () => {
    const now = new Date()
    document.getElementById('chat-date').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })

    loadChatBriefing()
    loadConversations()
    subscribeToConversations()
  })

  // ── VIEW SWITCHING ──
  function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
    document.getElementById('view-' + name).classList.add('active')
    const navEl = document.getElementById('nav-' + name)
    if (navEl) navEl.classList.add('active')
    if (name === 'conversations') loadConversations()
  }

  // ── CHAT BRIEFING ──
  async function loadChatBriefing() {
    const msgs = document.getElementById('chat-messages')

    // Show typing
    const typing = addTyping(msgs)

    // Get stats from Supabase
    const today = new Date()
    today.setHours(0,0,0,0)

    const { data: todayConvs } = await sb
      .from('conversations')
      .select('id, patient_number, created_at')
      .gte('created_at', today.toISOString())

    const { data: allConvs } = await sb
      .from('conversations')
      .select('patient_number')

    const uniquePatients = new Set(allConvs?.map(c => c.patient_number) || []).size
    const todayCount = todayConvs?.length || 0

    typing.remove()

    // Yana briefing message
    const now = new Date()
    const hour = now.getHours()
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening'

    addYanaMessage(msgs, `${greeting}, Dr. Silva. Here is what's happening with your clinic right now.`)

    // Stats card
    const card = document.createElement('div')
    card.className = 'msg-yana'
    card.innerHTML = `
      <div class="msg-yana-av">Y</div>
      <div class="msg-yana-body">
        <div class="inline-card">
          <div class="inline-card-head">
            <div>This week</div>
            <div style="font-size:11px;color:var(--n5)">${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <div class="inline-card-body">
            <div class="inline-card-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--o)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <div style="flex:1;font-size:12px;">Conversations today</div>
              <div style="font-size:13px;font-weight:500;">${todayCount}</div>
            </div>
            <div class="inline-card-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--grn)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <div style="flex:1;font-size:12px;">Total patients</div>
              <div style="font-size:13px;font-weight:500;">${uniquePatients}</div>
            </div>
          </div>
        </div>
      </div>`
    msgs.appendChild(card)

    // Quick replies
    const qr = document.createElement('div')
    qr.className = 'msg-yana'
    qr.innerHTML = `
      <div class="msg-yana-av" style="opacity:0">Y</div>
      <div class="msg-yana-body">
        <div class="quick-replies">
          <div class="qr-btn" onclick="askYana('Show me today\\'s conversations')">Today's conversations</div>
          <div class="qr-btn" onclick="askYana('How many patients this week?')">Weekly stats</div>
          <div class="qr-btn" onclick="switchView(\\'conversations\\')">See all patients</div>
        </div>
      </div>`
    msgs.appendChild(qr)
    msgs.scrollTop = msgs.scrollHeight
  }

  // ── CHAT INTERACTION ──
  function handleChatKey(e) {
    if (e.key === 'Enter') sendChatMessage()
  }

  async function sendChatMessage() {
    const input = document.getElementById('chat-input')
    const text = input.value.trim()
    if (!text) return
    input.value = ''
    await askYana(text)
  }

  async function askYana(text) {
    const msgs = document.getElementById('chat-messages')

    // Remove quick replies
    const qrs = msgs.querySelector('.quick-replies')
    if (qrs) qrs.closest('.msg-yana').remove()

    // Add doctor message
    const dm = document.createElement('div')
    dm.className = 'msg-doctor'
    dm.innerHTML = `<div class="msg-doctor-bubble">${text}</div>`
    msgs.appendChild(dm)
    msgs.scrollTop = msgs.scrollHeight

    // Show typing
    const typing = addTyping(msgs)

    // Simple command handling
    let response = ''
    const t = text.toLowerCase()

    if (t.includes('conversation') || t.includes('today')) {
      const today = new Date(); today.setHours(0,0,0,0)
      const { data } = await sb.from('conversations').select('*').gte('created_at', today.toISOString()).order('created_at', {ascending: false}).limit(5)
      if (data && data.length > 0) {
        response = `You had ${data.length} conversation${data.length > 1 ? 's' : ''} today. The most recent was from ${formatNumber(data[0].patient_number)} at ${new Date(data[0].created_at).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}.`
      } else {
        response = 'No conversations yet today. Your clinic is quiet for now.'
      }
    } else if (t.includes('patient') || t.includes('week')) {
      const { data } = await sb.from('conversations').select('patient_number')
      const unique = new Set(data?.map(c => c.patient_number) || []).size
      response = `You have ${unique} unique patient${unique !== 1 ? 's' : ''} in your database. Want me to show their conversations?`
    } else if (t.includes('hello') || t.includes('hi') || t.includes('bonjour')) {
      response = 'Hello! How can I help you manage your clinic today?'
    } else {
      response = `I received your message. This feature is coming soon — for now I can show you conversation stats and patient activity. Try asking "show today's conversations" or "how many patients this week?"`
    }

    typing.remove()
    addYanaMessage(msgs, response)
  }

  function addYanaMessage(container, text) {
    const el = document.createElement('div')
    el.className = 'msg-yana'
    el.innerHTML = `<div class="msg-yana-av">Y</div><div class="msg-yana-body"><div class="msg-yana-bubble">${text}</div></div>`
    container.appendChild(el)
    container.scrollTop = container.scrollHeight
  }

  function addTyping(container) {
    const el = document.createElement('div')
    el.className = 'msg-typing'
    el.innerHTML = `<div class="typing-av">Y</div><div class="typing-dots"><span></span><span></span><span></span></div>`
    container.appendChild(el)
    container.scrollTop = container.scrollHeight
    return el
  }

  // ── CONVERSATIONS ──
  async function loadConversations() {
    const { data, error } = await sb
      .from('conversations')
      .select('*')
      .order('created_at', { ascending: false })

    if (error || !data) return

    // Group by patient
    const patients = {}
    data.forEach(row => {
      if (!patients[row.patient_number]) {
        patients[row.patient_number] = { messages: [], latest: row }
      }
      patients[row.patient_number].messages.push(row)
    })

    allConversations = Object.entries(patients).map(([num, val]) => ({
      number: num,
      display: formatNumber(num),
      latest: val.latest,
      messages: val.messages.reverse(),
      count: val.messages.length
    }))

    renderConvList(allConversations)
    updateConvBadge(allConversations.length)
  }

  function renderConvList(list) {
    const container = document.getElementById('conv-items')
    const count = document.getElementById('conv-count')
    count.textContent = `${list.length} patient${list.length !== 1 ? 's' : ''}`

    if (list.length === 0) {
      container.innerHTML = `<div style="padding:24px;text-align:center;font-size:12px;color:var(--n5)">No conversations yet</div>`
      return
    }

    container.innerHTML = list.map((p, i) => `
      <div class="conv-item ${selectedPatient === p.number ? 'active' : ''}"
           onclick="selectPatient(this.dataset.num, ${i})" data-num="${p.number}"
           id="conv-item-${p.number.replace(/[^a-z0-9]/gi,'_')}">
        <div class="conv-av" style="background:${avatarColor(p.number)}">${initials(p.display)}</div>
        <div class="conv-body">
          <div class="conv-name">${p.display}</div>
          <div class="conv-preview">${p.latest.patient_message}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${timeAgo(p.latest.created_at)}</div>
        </div>
      </div>
    `).join('')
  }

  function selectPatient(number, idx) {
    selectedPatient = number
    const patient = allConversations.find(p => p.number === number)
    if (!patient) return

    // Update list selection
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'))
    const itemEl = document.getElementById('conv-item-' + number.replace(/[^a-z0-9]/gi,'_'))
    if (itemEl) itemEl.classList.add('active')

    // Render conversation
    const detail = document.getElementById('conv-detail')
    detail.innerHTML = `
      <div class="conv-detail-head">
        <div class="conv-av" style="background:${avatarColor(number)};width:30px;height:30px;font-size:11px;">${initials(patient.display)}</div>
        <div>
          <div class="conv-detail-name">${patient.display}</div>
          <div class="conv-detail-sub">${patient.count} message${patient.count !== 1 ? 's' : ''} · last active ${timeAgo(patient.latest.created_at)}</div>
        </div>
      </div>
      <div class="conv-messages" id="detail-messages">
        ${patient.messages.map(m => `
          <div class="bubble-patient">${m.patient_message}</div>
          <div class="bubble-yana">${m.yana_response}</div>
          <div class="bubble-time">${new Date(m.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
        `).join('')}
      </div>
    `

    const dm = document.getElementById('detail-messages')
    if (dm) dm.scrollTop = dm.scrollHeight
  }

  function filterConversations(query) {
    if (!query) { renderConvList(allConversations); return; }
    const filtered = allConversations.filter(p =>
      p.display.toLowerCase().includes(query.toLowerCase()) ||
      p.latest.patient_message.toLowerCase().includes(query.toLowerCase())
    )
    renderConvList(filtered)
  }

  // ── REALTIME ──
  function subscribeToConversations() {
    sb.channel('conversations')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversations' }, () => {
        loadConversations()
      })
      .subscribe()
  }

  function updateConvBadge(count) {
    const badge = document.getElementById('conv-badge')
    if (count > 0) {
      badge.textContent = count
      badge.style.display = 'flex'
    } else {
      badge.style.display = 'none'
    }
  }

  // ── HELPERS ──
  function formatNumber(num) {
    return num.replace('whatsapp:', '').replace('+', '+')
  }

  function initials(str) {
    const parts = str.replace('whatsapp:','').replace('+','').trim().split(' ')
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase()
    return str.replace(/[^a-z0-9]/gi,'').substring(0,2).toUpperCase()
  }

  function avatarColor(str) {
    const colors = ['#6366F1','#DA7756','#059669','#3B82F6','#8B5CF6','#EF4444','#D97706','#0EA5E9']
    let hash = 0
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash)
    return colors[Math.abs(hash) % colors.length]
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts).getTime()
    const min = Math.floor(diff / 60000)
    if (min < 1) return 'just now'
    if (min < 60) return `${min}m ago`
    const h = Math.floor(min / 60)
    if (h < 24) return `${h}h ago`
    return `${Math.floor(h/24)}d ago`
  }
</script>
